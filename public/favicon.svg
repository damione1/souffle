<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b74e8"/>
      <stop offset="100%" stop-color="#234a9e"/>
    </linearGradient>
    <linearGradient id="souffle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd98a"/>
      <stop offset="70%" stop-color="#f0b75a"/>
      <stop offset="100%" stop-color="#d99a3e"/>
    </linearGradient>
    <linearGradient id="ramekin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dde6f5"/>
    </linearGradient>
  </defs>

  
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- steam rising as sound waves -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round">
    <path d="M 392 360 C 376 320 408 296 392 256" stroke-width="34" opacity="0.55"/>
    <path d="M 512 348 C 492 296 540 264 516 196" stroke-width="38" opacity="0.9"/>
    <path d="M 632 360 C 616 320 648 296 632 256" stroke-width="34" opacity="0.55"/>
  </g>

  <!-- soufflé dome puffing over the rim -->
  <path d="M 332 560
           C 326 470 392 412 512 412
           C 632 412 698 470 692 560 Z" fill="url(#souffle)"/>
  <!-- dome highlight -->
  <path d="M 380 472 C 420 438 470 428 512 428" fill="none" stroke="#ffe9b8" stroke-width="26" stroke-linecap="round" opacity="0.8"/>

  <!-- ramekin: fluted cup -->
  <path d="M 320 560 L 704 560 L 688 800
           C 686 826 664 844 638 844 L 386 844
           C 360 844 338 826 336 800 Z" fill="url(#ramekin)"/>
  <!-- rim lip -->
  <rect x="300" y="536" width="424" height="48" rx="24" fill="#ffffff"/>
  <!-- flutes -->
  <g stroke="#b9c8e4" stroke-width="14" stroke-linecap="round" opacity="0.75">
    <line x1="404" y1="612" x2="398" y2="800"/>
    <line x1="476" y1="612" x2="474" y2="808"/>
    <line x1="548" y1="612" x2="550" y2="808"/>
    <line x1="620" y1="612" x2="626" y2="800"/>
  </g>
</svg>
