name: Release

# Builds the macOS installer on every version tag and attaches it to a GitHub Release.
#   git tag v0.1.0 && git push origin v0.1.0
#
# macOS Apple Silicon only, single leg (aarch64-apple-darwin). Souffle has no
# other target: Metal inference (candle, whisper.cpp) and Core Audio process
# taps are Apple Silicon only, and the bundled resources/libonnxruntime.dylib
# is an arm64 build. There is no Intel mac, Windows, Linux, or mobile leg.
#
# Apple Intelligence: release builds on macos-26 (GA since 2026-02-26) link the
# real FoundationModels bridge via Xcode 26. The bridge is statically linked
# into the binary during build; no separate dylib ships in the bundle.
#
# Signing + notarization are optional: the six APPLE_* secrets listed below
# already exist in this repo. Without them the build still works, it just
# ships unsigned.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Create the draft release exactly once, up front, and let the build job
  # upload into it by id. This avoids a race where the job creates its own
  # release draft on top of a concurrent one.
  # ---------------------------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create draft release
        id: create
        uses: actions/github-script@v8
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const footer = [
              'Download the .dmg below for Apple Silicon Macs.',
              '',
              'Requires macOS 13 or newer on Apple Silicon (M1 or newer).',
            ].join('\n');

            // Hand-written notes live in the annotated tag message (see
            // CLAUDE.md, "Release changelogs"). Use them as the release body
            // when present; a lightweight or empty-message tag falls back to
            // GitHub's auto-generated notes (merged PR titles, structured by
            // .github/release.yml) so no release ever ships without notes.
            let notes = '';
            try {
              const { data: ref } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
              if (ref.object.type === 'tag') {
                const { data: tagObj } = await github.rest.git.getTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_sha: ref.object.sha,
                });
                notes = (tagObj.message ?? '')
                  .replace(/-----BEGIN (PGP|SSH) SIGNATURE-----[\s\S]*$/, '')
                  .trim();
                // Drop a leading title line that just repeats the release
                // name (the common `git tag -a` habit) to avoid duplication.
                const lines = notes.split('\n');
                if (/^(Soufflé\s+)?v?\d+\.\d+\.\d+$/.test(lines[0]?.trim() ?? '')) {
                  notes = lines.slice(1).join('\n').trim();
                }
              }
            } catch (e) {
              core.warning(`Could not read tag annotation: ${e.message}`);
            }

            // With generate_release_notes, GitHub appends its generated
            // "What's Changed" section after the provided body, so
            // hand-written notes are never overwritten either way.
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Soufflé ${tag}`,
              body: notes ? `${notes}\n\n---\n\n${footer}` : `${footer}\n`,
              generate_release_notes: notes === '',
              draft: true,
              prerelease: false,
            });
            return data.id;

  # ---------------------------------------------------------------------------
  # macOS (Apple Silicon): builds the signed/notarized .dmg and uploads it
  # into the draft release created above.
  # ---------------------------------------------------------------------------
  desktop:
    needs: create-release
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # cmake builds the sentencepiece tokenizer; it's preinstalled on
      # GitHub's macOS runner images, so no separate setup step is needed.

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Set app version from tag
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          export VERSION="${TAG#v}"
          sed -i '' "s/^version = .*/version = \"$VERSION\"/" src-tauri/Cargo.toml
          echo "App version set to $VERSION in Cargo.toml"
        # The app version comes from src-tauri/Cargo.toml [package] version.
        # We patch it from the tag here so the tag is the single source of truth
        # for the release. The build reads this via env!("CARGO_PKG_VERSION").

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (optional, leave unset to ship unsigned)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target aarch64-apple-darwin
